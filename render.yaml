services:
  - type: web
    name: queuestorm-investigator
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: USE_LLM
        value: "false"
      # LLM_PROVIDER, LLM_BASE_URL, LLM_API_KEY, LLM_MODEL left empty — deterministic path only
      - key: LLM_PROVIDER
        value: ""
      - key: LLM_API_KEY
        value: ""
      - key: LLM_TIMEOUT_SECONDS
        value: "25"
